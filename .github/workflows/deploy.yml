name: Deploy

# Triggers on every merge/push to main, or manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy can run at a time; never cancel a running deploy.
concurrency:
  group: deploy
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (Settings → Secrets → Actions):
#
#   SSH_HOST          IP address or hostname of your production server
#   SSH_USER          SSH login user (e.g. ubuntu, deploy)
#   SSH_PRIVATE_KEY   Full private key (-----BEGIN ... -----)
#   SSH_PORT          SSH port — omit to default to 22
#   DEPLOY_PATH       Absolute path on server (e.g. /opt/tadabbur)
#   GHCR_TOKEN        GitHub PAT with read:packages scope, for pulling on server
#
# The server must have Docker + Docker Compose v2 installed, and a .env file
# at DEPLOY_PATH with all production values filled in.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Run tests first ──────────────────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-for-testing-only
          DEBUG: 'True'
          DJANGO_SETTINGS_MODULE: config.settings.development
          MONGO_HOST: localhost
          MONGO_PORT: '27017'
          MONGO_DB_NAME: tadabbur_ci
          MONGO_USERNAME: ''
          MONGO_PASSWORD: ''
        run: pytest --tb=short -q

  frontend-build:
    name: Frontend build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api/v1
        run: npm run build

  # ── 2. Build Docker images and push to GHCR ────────────────────────────────
  build:
    name: Build & push images
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ghcr.io/${{ github.repository_owner }}/tadabbur-backend:latest
            ghcr.io/${{ github.repository_owner }}/tadabbur-backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ghcr.io/${{ github.repository_owner }}/tadabbur-frontend:latest
            ghcr.io/${{ github.repository_owner }}/tadabbur-frontend:${{ github.sha }}

      - name: Build & push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx
          tags: |
            ghcr.io/${{ github.repository_owner }}/tadabbur-nginx:latest
            ghcr.io/${{ github.repository_owner }}/tadabbur-nginx:${{ github.sha }}

  # ── 3. SSH into server, pull images, restart ───────────────────────────────
  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file and Caddyfile to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Pull new images and restart stack
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          envs: GHCR_TOKEN,GHCR_USER,DEPLOY_PATH,IMAGE_TAG,GHCR_OWNER
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd "$DEPLOY_PATH"
            export IMAGE_TAG="$IMAGE_TAG"
            export GHCR_OWNER="$GHCR_OWNER"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Deployed commit $IMAGE_TAG"
