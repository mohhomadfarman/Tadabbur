name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time; never cancel a running deploy.
concurrency:
  group: deploy
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────────────────────
# Required GitHub Secrets (Settings → Secrets → Actions):
#
#   SSH_HOST          IP address or hostname of your production server
#   SSH_USER          SSH login user (e.g. root, ubuntu)
#   SSH_PRIVATE_KEY   Full private key (-----BEGIN ... -----)
#   SSH_PORT          SSH port — omit to default to 22
#   DEPLOY_PATH       Absolute path on server (e.g. /root/app/Tadabbur)
#
# The server must have Docker + Docker Compose v2 installed, and a .env file
# at DEPLOY_PATH with all production values filled in.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Run tests ─────────────────────────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          SECRET_KEY: ci-secret-key-for-testing-only
          DEBUG: 'True'
          DJANGO_SETTINGS_MODULE: config.settings.development
          MONGO_HOST: localhost
          MONGO_PORT: '27017'
          MONGO_DB_NAME: tadabbur_ci
          MONGO_USERNAME: ''
          MONGO_PASSWORD: ''
        run: pytest --tb=short -q

  frontend-build:
    name: Frontend build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api/v1
        run: npm run build

  # ── 2. SSH into server: pull code, build images, restart stack ───────────────
  deploy:
    name: Deploy to production
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 20m
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull
            # Unique per deploy so the frontend SSG build re-runs against the
            # current sitemap/content instead of reusing a stale cached layer.
            export CACHEBUST=$(date +%s)
            docker compose -f docker-compose.prod.yml build --pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Deployed $(git rev-parse --short HEAD)"
