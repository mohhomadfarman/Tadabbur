# Production compose — pulls pre-built images from GHCR.
# Set these env vars before running manually:
#   export IMAGE_TAG=<git-sha-or-latest>
#   export GHCR_OWNER=mohhomadfarman
#   docker compose -f docker-compose.prod.yml up -d
#
# In CI/CD these are set automatically by the deploy workflow.

services:

  mongo:
    image: mongo:7.0
    container_name: tadabbur_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo_data:/data/db
    networks:
      - tadabbur_net

  redis:
    image: redis:7-alpine
    container_name: tadabbur_redis
    restart: unless-stopped
    networks:
      - tadabbur_net

  backend:
    image: ghcr.io/${GHCR_OWNER}/tadabbur-backend:${IMAGE_TAG:-latest}
    container_name: tadabbur_backend
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    env_file: .env
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      - mongo
      - redis
    networks:
      - tadabbur_net

  celery:
    image: ghcr.io/${GHCR_OWNER}/tadabbur-backend:${IMAGE_TAG:-latest}
    container_name: tadabbur_celery
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - mongo
    networks:
      - tadabbur_net

  frontend:
    image: ghcr.io/${GHCR_OWNER}/tadabbur-frontend:${IMAGE_TAG:-latest}
    container_name: tadabbur_frontend
    restart: unless-stopped
    networks:
      - tadabbur_net

  nginx:
    image: ghcr.io/${GHCR_OWNER}/tadabbur-nginx:${IMAGE_TAG:-latest}
    container_name: tadabbur_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    networks:
      - tadabbur_net

networks:
  tadabbur_net:
    driver: bridge

volumes:
  mongo_data:
  static_files:
