services:

  mongo:
    image: mongo:7.0
    container_name: tadabbur_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo_data:/data/db
    networks:
      - tadabbur_net

  redis:
    image: redis:7-alpine
    container_name: tadabbur_redis
    restart: unless-stopped
    networks:
      - tadabbur_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tadabbur_backend
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    env_file: .env
    volumes:
      - static_files:/app/staticfiles
    depends_on:
      - mongo
      - redis
    networks:
      - tadabbur_net

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tadabbur_celery
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - mongo
    networks:
      - tadabbur_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tadabbur_frontend
    networks:
      - tadabbur_net

  # Headless-Chrome renderer: serves crawlers fully-rendered HTML of the SPA.
  # Internal only (no published port) — reached by nginx for bot user-agents.
  rendertron:
    build:
      context: ./rendertron
      dockerfile: Dockerfile
    container_name: tadabbur_rendertron
    restart: unless-stopped
    networks:
      - tadabbur_net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: tadabbur_nginx
    restart: unless-stopped
    # Host system nginx terminates TLS on :80/:443 and proxies to this
    # container on :8080. Do NOT use "80:80" here — it collides with the
    # host nginx and the container fails to bind ("address already in use").
    ports:
      - "8080:80"
    volumes:
      - static_files:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
      - rendertron
    networks:
      - tadabbur_net

networks:
  tadabbur_net:
    driver: bridge

volumes:
  mongo_data:
  static_files:
