server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve vite-ssg's prerendered <route>/index.html directly as a file.
    # Using $uri/index.html (not $uri/) avoids nginx's directory trailing-slash
    # 301 — a request to /lesson/foo must return that page, not redirect to
    # /lesson/foo/. Unmatched routes fall back to the SPA shell.
    location / {
        try_files $uri $uri/index.html /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
