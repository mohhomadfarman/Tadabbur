server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve vite-ssg's prerendered <route>/index.html directly as a file.
    # Using $uri/index.html (not $uri/) avoids nginx's directory trailing-slash
    # 301 — a request to /lesson/foo must return that page, not redirect to
    # /lesson/foo/. Unmatched routes check for a slug-rename redirect before
    # falling back to the SPA shell (see @redirect_check below).
    location / {
        try_files $uri $uri/index.html @redirect_check;
        add_header Cache-Control "no-cache";
    }

    # A path with no prerendered file might be a renamed slug — ask the
    # backend for a real 301 so Google (and bookmarked links) land on the new
    # URL instead of getting a soft-404'd SPA shell. No redirect on record, or
    # the backend/Redis is unreachable, falls back to today's behavior.
    location @redirect_check {
        internal;
        proxy_intercept_errors on;
        error_page 404 502 503 504 = /index.html;
        proxy_pass http://backend:8000/api/v1/redirects/resolve/?path=$uri;
        proxy_set_header Host $host;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
