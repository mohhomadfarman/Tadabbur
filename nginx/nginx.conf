events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Security headers applied to all responses
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-Frame-Options          "DENY"          always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    upstream django_backend {
        server backend:8000;
    }

    # Rendertron prerenderer. Declaring it as an upstream lets nginx resolve the
    # name at startup via Docker DNS (reliable), so the prerender proxy_pass can
    # carry a variable ($request_uri) without needing a request-time resolver
    # (which SERVFAIL'd against 127.0.0.11).
    upstream rendertron_backend {
        server rendertron:3000;
    }

    # Honor the scheme set by the host TLS terminator that fronts this
    # container. Only fall back to $scheme (always "http" here, since this
    # nginx listens on :80) when no upstream proxy header is present.
    # Without this, the real "https" gets overwritten with "http", Django's
    # SECURE_SSL_REDIRECT 301s back to https, and the request loops forever.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    # Detect crawlers/social scrapers so we can serve them pre-rendered HTML
    # (the Vue SPA is otherwise an empty shell until JS runs). Rendertron itself
    # fetches pages with a normal Chrome UA, so it does NOT match here — no loop.
    map $http_user_agent $is_bot {
        default 0;
        "~*(googlebot|bingbot|yandex|duckduckbot|baiduspider|applebot|twitterbot|facebookexternalhit|linkedinbot|whatsapp|slackbot|telegrambot|discordbot|pinterest|redditbot|embedly)" 1;
    }

    # Redirect www → non-www
    server {
        listen 80;
        server_name www.thetadabbur.org;
        return 301 http://thetadabbur.org$request_uri;
    }

    server {
        listen 80;
        server_name thetadabbur.org;

        # Vue.js SPA — crawlers get pre-rendered HTML, humans get the SPA.
        location / {
            set $prerender 0;
            if ($is_bot = 1) { set $prerender 1; }
            # Never pre-render static assets / data files — only HTML routes.
            if ($uri ~* \.(js|css|json|xml|txt|png|jpe?g|gif|svg|ico|webp|woff2?|ttf|eot|map|mp3|mp4|pdf)$) {
                set $prerender 0;
            }
            if ($prerender = 1) { rewrite ^ /_prerender last; }

            proxy_pass http://frontend:80;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Internal: hand the original URL to Rendertron for headless rendering.
        # $request_uri keeps the original path+query through the internal rewrite.
        location /_prerender {
            internal;
            proxy_pass http://rendertron_backend/render/https://thetadabbur.org$request_uri;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Django REST API
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Django admin panel
        location /admin/ {
            proxy_pass http://django_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Django static files (admin CSS/JS)
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # robots.txt served from Vue public dir; sitemap.xml generated by Django
        location = /robots.txt  { proxy_pass http://frontend:80/robots.txt; }
        location = /sitemap.xml {
            proxy_pass http://django_backend/sitemap.xml;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }
    }
}
