events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Security headers applied to all responses
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-Frame-Options          "DENY"          always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    upstream django_backend {
        server backend:8000;
    }

    # Honor the scheme set by the host TLS terminator that fronts this
    # container. Only fall back to $scheme (always "http" here, since this
    # nginx listens on :80) when no upstream proxy header is present.
    # Without this, the real "https" gets overwritten with "http", Django's
    # SECURE_SSL_REDIRECT 301s back to https, and the request loops forever.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    # Redirect www → non-www
    server {
        listen 80;
        server_name www.thetadabbur.org;
        return 301 http://thetadabbur.org$request_uri;
    }

    server {
        listen 80;
        server_name thetadabbur.org;

        # Vue.js SPA. Bot pre-rendering (Rendertron) is temporarily disabled —
        # the service isn't deployed in docker-compose.prod.yml, and requiring
        # it as a startup upstream took nginx (and the whole site) down. Re-add
        # the rendertron service + prerender routing together when ready.
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Django REST API
        location /api/ {
            proxy_pass http://django_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Django admin panel — served at /django-admin so the SPA keeps /admin/*
        # (deep frontend admin routes must survive a refresh, not hit Django).
        location /django-admin/ {
            proxy_pass http://django_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # Django static files (admin CSS/JS)
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # robots.txt served from Vue public dir; sitemap.xml generated by Django
        location = /robots.txt  { proxy_pass http://frontend:80/robots.txt; }
        location = /sitemap.xml {
            proxy_pass http://django_backend/sitemap.xml;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }
    }
}
